<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8C9B5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B8E71;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="200" r="80" fill="#6B8E71" opacity="0.2"/>
  <circle cx="950" cy="400" r="120" fill="#F5F1E8" opacity="0.1"/>
  <circle cx="200" cy="1100" r="100" fill="#F5F1E8" opacity="0.15"/>
  <circle cx="950" cy="1200" r="80" fill="#6B8E71" opacity="0.2"/>

  <!-- Tenébrio/Larva illustration -->
  <g transform="translate(540, 500)">
    <!-- Body segments -->
    <ellipse cx="-80" cy="0" rx="35" ry="50" fill="#8B6F47" opacity="0.9"/>
    <ellipse cx="-40" cy="-20" rx="40" ry="55" fill="#9B7F57" opacity="0.9"/>
    <ellipse cx="0" cy="-30" rx="45" ry="60" fill="#A88F67" opacity="0.9"/>
    <ellipse cx="40" cy="-25" rx="42" ry="58" fill="#9B7F57" opacity="0.9"/>
    <ellipse cx="80" cy="0" rx="38" ry="52" fill="#8B6F47" opacity="0.9"/>

    <!-- Shine effect -->
    <ellipse cx="0" cy="-35" rx="35" ry="40" fill="#C9B89F" opacity="0.3"/>

    <!-- Antennae -->
    <path d="M -30 -50 Q -60 -100 -40 -120" stroke="#6B4423" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 30 -50 Q 60 -100 40 -120" stroke="#6B4423" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Text overlay -->
  <text x="540" y="900" font-family="Poppins, Inter, sans-serif" font-size="64" font-weight="700" text-anchor="middle" fill="#F5F1E8">
    Ecotenébrios
  </text>
  <text x="540" y="1000" font-family="Poppins, Inter, sans-serif" font-size="36" text-anchor="middle" fill="#F5F1E8" opacity="0.9">
    Alimentação Natural Premium
  </text>

  <!-- Leaf decoration -->
  <g transform="translate(900, 150)">
    <path d="M 0 0 Q 20 -30 15 -60 Q 10 -35 0 -40 Q -10 -35 -15 -60 Q -20 -30 0 0" fill="#F5F1E8" opacity="0.6"/>
  </g>
</svg>