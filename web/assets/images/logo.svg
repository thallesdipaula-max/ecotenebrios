<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Transparent background by default (no fill on rect) -->

  <!-- Left leaf -->
  <g transform="translate(80, 100)">
    <path d="M 30 0 Q 50 -20 45 -50 Q 40 -30 30 -35 Q 20 -30 25 -50 Q 20 -20 30 0"
          fill="#6B8E71" opacity="0.9"/>
    <path d="M 30 0 Q 50 -20 45 -50" stroke="#4a5f4e" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>

  <!-- Right leaf -->
  <g transform="translate(290, 100)">
    <path d="M 30 0 Q 50 -20 45 -50 Q 40 -30 30 -35 Q 20 -30 25 -50 Q 20 -20 30 0"
          fill="#A8C9B5" opacity="0.85"/>
    <path d="M 30 0 Q 50 -20 45 -50" stroke="#6B8E71" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>

  <!-- Tenébrio/Larva - Main illustration -->
  <g transform="translate(200, 180)">
    <!-- Head -->
    <circle cx="0" cy="-45" r="18" fill="#8B6F47"/>
    <circle cx="-8" cy="-48" r="5" fill="#4a3d2a"/>
    <circle cx="8" cy="-48" r="5" fill="#4a3d2a"/>

    <!-- Antennae -->
    <path d="M -6 -55 Q -18 -75 -12 -90" stroke="#6B4423" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 6 -55 Q 18 -75 12 -90" stroke="#6B4423" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Body segments - Main -->
    <ellipse cx="-60" cy="0" rx="28" ry="40" fill="#7A5F3E"/>
    <ellipse cx="-35" cy="-8" rx="32" ry="44" fill="#8B6F47"/>
    <ellipse cx="-8" cy="-12" rx="36" ry="48" fill="#9B7F57"/>
    <ellipse cx="20" cy="-10" rx="34" ry="46" fill="#8B6F47"/>
    <ellipse cx="45" cy="-2" rx="30" ry="42" fill="#7A5F3E"/>
    <ellipse cx="68" cy="10" rx="26" ry="38" fill="#6B5838"/>

    <!-- Shine/highlight on main body -->
    <ellipse cx="0" cy="-25" rx="28" ry="35" fill="#C9B89F" opacity="0.25"/>
    <ellipse cx="30" cy="-8" rx="20" ry="28" fill="#D4C4A8" opacity="0.2"/>

    <!-- Detail lines on segments -->
    <line x1="-20" y1="-15" x2="-20" y2="15" stroke="#6B4423" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="-18" x2="10" y2="18" stroke="#6B4423" stroke-width="1.5" opacity="0.4"/>
    <line x1="40" y1="-12" x2="40" y2="12" stroke="#6B4423" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Bottom ornament - small leaves/dots -->
  <g transform="translate(100, 320)">
    <circle cx="0" cy="0" r="4" fill="#6B8E71" opacity="0.7"/>
    <circle cx="20" cy="5" r="5" fill="#A8C9B5" opacity="0.6"/>
    <circle cx="40" cy="2" r="4" fill="#6B8E71" opacity="0.7"/>
  </g>

  <!-- Text: EcoTenébrios -->
  <text x="200" y="310"
        font-family="'Poppins', 'Inter', sans-serif"
        font-size="48"
        font-weight="700"
        text-anchor="middle"
        fill="#6B8E71">
    EcoTenébrios
  </text>

  <!-- Subtitle text -->
  <text x="200" y="345"
        font-family="'Poppins', 'Inter', sans-serif"
        font-size="16"
        font-weight="500"
        text-anchor="middle"
        fill="#A8C9B5"
        letter-spacing="1">
    Tenébrio Vivo e Desidratado
  </text>
</svg>